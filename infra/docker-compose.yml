services:
  backend:
    build:
      context: ../server
    environment:
      - NODE_ENV=development
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    ports:
      - "3001:3001"
    networks:
      - expense-tracker-net

  frontend:
    build:
      context: ../client
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - expense-tracker-net

networks:
  expense-tracker-net:
