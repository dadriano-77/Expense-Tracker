stages:
  - test
  - report
  - build
  - deploy
  - trigger

variables:
  BACKEND_IMAGE: registry.gitlab.com/dadriano2/expense-tracker/backend:$CI_COMMIT_SHA
  FRONTEND_IMAGE: registry.gitlab.com/dadriano2/expense-tracker/frontend:$CI_COMMIT_SHA

# ── Stage 1: Unit tests (parallel) ────────────────────────────────────────

server-tests:
  stage: test
  image: node:22-alpine
  tags:
    - docker
  script:
    - npm ci
    - mkdir -p reports/unit
    - npm test --workspace=server -- --json --outputFile=../reports/unit/results.json
  artifacts:
    when: always
    paths:
      - reports/unit/
    expire_in: 30 days

client-tests:
  stage: test
  image: node:22-alpine
  tags:
    - docker
  script:
    - npm ci
    - mkdir -p reports/component
    - npm test --workspace=client -- --reporter=json --outputFile=../reports/component/results.json
  artifacts:
    when: always
    paths:
      - reports/component/
    expire_in: 30 days

# ── Stage 2: Generate unit test report ────────────────────────────────────

generate-report:
  stage: report
  image: node:22-alpine
  tags:
    - docker
  when: always
  dependencies:
    - server-tests
    - client-tests
  script:
    - mkdir -p reports/unit reports/component
    - |
      node -e "
        const fs = require('fs');
        const unit = fs.existsSync('reports/unit/results.json')
          ? JSON.parse(fs.readFileSync('reports/unit/results.json', 'utf8'))
          : null;
        const comp = fs.existsSync('reports/component/results.json')
          ? JSON.parse(fs.readFileSync('reports/component/results.json', 'utf8'))
          : null;
        const unitFailed = unit ? (unit.numFailedTests || 0) > 0 : false;
        const compFailed = comp ? (comp.numFailedTests || 0) > 0 : false;
        const overall = (unitFailed || compFailed) ? 'FAIL' : 'PASS';
        fs.writeFileSync('reports/pipeline-run.json', JSON.stringify({
          runAt: new Date().toISOString(),
          durationMs: 0,
          overallStatus: overall,
          stages: [
            { name: 'Unit Tests',      status: unit ? (unitFailed ? 'FAIL' : 'PASS') : 'SKIP', durationMs: 0 },
            { name: 'Component Tests', status: comp ? (compFailed ? 'FAIL' : 'PASS') : 'SKIP', durationMs: 0 },
          ]
        }, null, 2));
      "
    - node generate-report.js reports
  artifacts:
    when: always
    paths:
      - reports/pipeline-report.html
    expire_in: 30 days

# ── Stage 3: Build & push to GitLab Container Registry ────────────────────

build-push:
  stage: build
  image: docker:24-cli
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -f server/Dockerfile -t $BACKEND_IMAGE .
    - docker push $BACKEND_IMAGE
    - docker build -f client/Dockerfile -t $FRONTEND_IMAGE .
    - docker push $FRONTEND_IMAGE
    - docker tag $BACKEND_IMAGE registry.gitlab.com/dadriano2/expense-tracker/backend:latest
    - docker push registry.gitlab.com/dadriano2/expense-tracker/backend:latest
    - docker tag $FRONTEND_IMAGE registry.gitlab.com/dadriano2/expense-tracker/frontend:latest
    - docker push registry.gitlab.com/dadriano2/expense-tracker/frontend:latest

# ── Stage 4: Deploy to local Docker staging ───────────────────────────────

deploy-staging:
  stage: deploy
  image: docker:24-cli
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache curl
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $BACKEND_IMAGE
    - docker pull $FRONTEND_IMAGE
    - |
      BACKEND_IMAGE=$BACKEND_IMAGE FRONTEND_IMAGE=$FRONTEND_IMAGE JWT_SECRET=$JWT_SECRET \
      docker compose -f deploy/docker-compose.staging.yml -p expense-tracker-staging \
        up -d --force-recreate
    - |
      for i in $(seq 1 30); do
        curl -sf http://localhost:3001/health && echo "Staging backend ready" && break
        echo "Waiting ($i/30)..." && sleep 2
      done
      curl -sf http://localhost:3001/health || { docker compose -p expense-tracker-staging logs; exit 1; }

# ── Stage 5: Trigger test pipeline ────────────────────────────────────────

trigger-tests:
  stage: trigger
  image: docker:24-cli
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -f -X POST \
        --form "token=$TEST_TRIGGER_TOKEN" \
        --form "ref=main" \
        --form "variables[BACKEND_IMAGE]=$BACKEND_IMAGE" \
        --form "variables[FRONTEND_IMAGE]=$FRONTEND_IMAGE" \
        --form "variables[SOURCE_PIPELINE_URL]=$CI_PIPELINE_URL" \
        "https://gitlab.com/api/v4/projects/$TEST_PROJECT_ID/trigger/pipeline"
